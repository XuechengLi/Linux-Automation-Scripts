#客户发货系统
server {
    listen 8787 ; 
    server_name localhost; 
    root /opt/deploy-application/frontend/address.houbaoyan.cn;    #推免模拟系统
    index index.html;
    # 禁止cache缓存
	add_header Cache-Control no-cache,no-store;
    location / {
      try_files $uri $uri/ /index.html;    # /index.html: 如果以上都不存在，则返回 index.html
    }
    location /nginx_status {
        stub_status on;
        allow all;  # 只允许本机访问
        #deny all;         # 拒绝其他所有 IP
        access_log off;   # 不记录此接口的访问日志
    }
}

